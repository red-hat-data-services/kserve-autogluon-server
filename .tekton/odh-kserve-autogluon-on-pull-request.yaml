apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  annotations:
    build.appstudio.openshift.io/repo: https://github.com/red-hat-data-services/kserve-autogluon-server?rev={{revision}}
    build.appstudio.redhat.com/commit_sha: '{{revision}}'
    build.appstudio.redhat.com/target_branch: '{{target_branch}}'
    build.appstudio.redhat.com/pull_request_number: "{{pull_request_number}}"
    pipelinesascode.tekton.dev/max-keep-runs: "3"
    pipelinesascode.tekton.dev/on-comment: "^/build-konflux-autogluon"
    pipelinesascode.tekton.dev/on-label: "[kfbuild-all, kfbuild-autogluon]"
    pipelinesascode.tekton.dev/on-target-branch: "[{{target_branch}}]"
    pipelinesascode.tekton.dev/on-event: "[pull_request]"
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
  labels:
    appstudio.openshift.io/application: automation
    appstudio.openshift.io/component: pull-request-pipelines-odh-kserve-autogluon-server
    pipelines.appstudio.openshift.io/type: build
  name: odh-kserve-autogluon-server-on-pull-request
  namespace: rhoai-tenant
spec:
  timeouts:
    pipeline: 8h
  params:

  - name: git-url
    value: '{{source_url}}'
  - name: revision
    value: '{{revision}}'
  - name: additional-tags
    value:
    - 'pr-{{pull_request_number}}-into-{{target_branch}}'
  - name: additional-labels
    value:
    - version=on-pr-{{revision}}
    - io.openshift.tags=odh-kserve-autogluon-server
  - name: output-image
    value: quay.io/rhoai/pull-request-pipelines:odh-kserve-autogluon-server-{{revision}}
  - name: build-platforms
    value:
      - linux/x86_64
      - linux/ppc64le
      - linux/s390x
      - linux-m2xlarge/arm64
  - name: image-expires-after
    value: 5d
  - name: dockerfile
    value: ../Dockerfile.konflux.autogluon
  - name: path-context
    value: python
  - name: hermetic
    value: "true"
  - name: prefetch-input
    value: 
        [
          {
            "type": "pip",
            "path": "python/autogluonserver",
            "requirements_files": [
              "autogluon-all-requirements.txt"
            ],
            "binary": {"arch": ":all:"}
          }
        ]
  - name: build-image-index
    value: true
  - name: enable-stack-failure-notification
    value: "false"
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/red-hat-data-services/konflux-central.git
    - name: revision
      value: '{{target_branch}}'
    - name: pathInRepo
      value: pipelines/multi-arch-container-build.yaml
  taskRunTemplate:
    serviceAccountName: build-pipeline-pull-request-pipelines
  workspaces:
  - name: git-auth
    secret:
      secretName: '{{ git_auth_secret }}'
status: {}
